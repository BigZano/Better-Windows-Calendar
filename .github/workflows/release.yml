name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Windows: icon embed → exe → Inno Setup installer ────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Extract version
        id: ver
        shell: pwsh
        run: echo "VERSION=$($env:GITHUB_REF -replace 'refs/tags/v','')" >> $env:GITHUB_OUTPUT

      - name: Install go-winres
        run: go install github.com/tc-hib/go-winres@latest

      - name: Patch version in winres.json
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.VERSION }}"
          $quad = "$ver.0"   # e.g. 1.2.3.0
          $j = Get-Content winres/winres.json -Raw
          $j = $j -replace '"file_version": ".*"',    "`"file_version`": `"$quad`""
          $j = $j -replace '"product_version": ".*"', "`"product_version`": `"$quad`""
          $j = $j -replace '"FileVersion": ".*"',     "`"FileVersion`": `"$ver`""
          $j = $j -replace '"ProductVersion": ".*"',  "`"ProductVersion`": `"$ver`""
          Set-Content winres/winres.json $j -Encoding UTF8

      - name: Generate Windows resources (.syso)
        run: go-winres make --in winres/winres.json

      - name: Build exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $env:GOARCH = "amd64"; $env:GOOS = "windows"
          go build -ldflags="-H windowsgui -s -w -X main.version=${{ steps.ver.outputs.VERSION }}" `
            -o dist/pycalendar.exe .

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $tmp = "$env:TEMP\innosetup.exe"
          Invoke-WebRequest -Uri "https://files.jrsoftware.org/is/6/innosetup-6.3.3.exe" -OutFile $tmp
          & $tmp /VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP-
          Start-Sleep -Seconds 5

      - name: Patch version in setup.iss
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.VERSION }}"
          $iss = Get-Content installer/windows/setup.iss -Raw
          $iss = $iss -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$ver`""
          Set-Content installer/windows/setup.iss $iss -Encoding UTF8

      - name: Compile installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\windows\setup.iss'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/pycalendar.exe
            dist/PyCalendarSetup-v*.exe

  # ── Linux: binary + tar.gz + install.sh ─────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev \
            libxxf86vm-dev libwayland-dev wayland-protocols libxkbcommon-dev \
            pkg-config

      - name: Extract version
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build binary + tar.gz
        run: bash scripts/build-linux.sh "${{ steps.ver.outputs.VERSION }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/pycalendar-*-linux-amd64.tar.gz

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: windows
          path: dist/windows

      - uses: actions/download-artifact@v4
        with:
          name: linux
          path: dist/linux

      - name: Extract version
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Stamp install.sh with version
        run: |
          VER="${{ steps.ver.outputs.VERSION }}"
          sed "s|PYCALENDAR_VERSION:-}|PYCALENDAR_VERSION:-$VER}|" \
            scripts/install.sh > dist/install.sh
          chmod +x dist/install.sh

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "PyCalendar v${{ steps.ver.outputs.VERSION }}"
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: true
          files: |
            dist/windows/PyCalendarSetup-v*.exe
            dist/windows/pycalendar.exe
            dist/linux/pycalendar-*-linux-amd64.tar.gz
            dist/install.sh
