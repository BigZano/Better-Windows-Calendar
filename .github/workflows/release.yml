name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Windows: build .exe + Inno Setup installer ──────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Extract version
        id: ver
        shell: pwsh
        run: echo "VERSION=$($env:GITHUB_REF -replace 'refs/tags/v','')" >> $env:GITHUB_OUTPUT

      - name: Build exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $env:GOARCH = "amd64"; $env:GOOS = "windows"
          go build -ldflags="-H windowsgui -s -w -X main.version=${{ steps.ver.outputs.VERSION }}" `
            -o dist/pycalendar.exe .

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $installer = "$env:TEMP\innosetup.exe"
          Invoke-WebRequest -Uri "https://files.jrsoftware.org/is/6/innosetup-6.3.3.exe" -OutFile $installer
          & $installer /VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP-
          Start-Sleep -Seconds 5

      - name: Patch version in setup.iss
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.VERSION }}"
          $iss = Get-Content installer\windows\setup.iss -Raw
          $iss = $iss -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$ver`""
          Set-Content installer\windows\setup.iss $iss -Encoding UTF8

      - name: Compile installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\windows\setup.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/pycalendar.exe
            dist/PyCalendarSetup-v*.exe

  # ── Linux: build binary + .deb + .tar.gz ────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev \
            libxxf86vm-dev libwayland-dev wayland-protocols libxkbcommon-dev \
            pkg-config

      - name: Extract version
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build and package
        run: bash scripts/build-linux.sh "${{ steps.ver.outputs.VERSION }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/pycalendar
            dist/pycalendar-*-linux-amd64.tar.gz
            dist/pycalendar_*_amd64.deb

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows
          path: dist/windows

      - uses: actions/download-artifact@v4
        with:
          name: linux
          path: dist/linux

      - name: Extract version
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "PyCalendar v${{ steps.ver.outputs.VERSION }}"
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: true
          files: |
            dist/windows/PyCalendarSetup-v*.exe
            dist/windows/pycalendar.exe
            dist/linux/pycalendar-*-linux-amd64.tar.gz
            dist/linux/pycalendar_*_amd64.deb
